name: 发送邮件提醒

on:
  schedule:
    # 每天 UTC 0:00 (北京时间 8:00) - 提前1小时应对GitHub Actions延迟
    - cron: '0 0 * * *'
    # 每天 UTC 12:00 (北京时间 20:00) - 提前1小时应对GitHub Actions延迟
    - cron: '0 12 * * *'
    # 每天 UTC 14:00 (北京时间 22:00) - 提前1小时应对GitHub Actions延迟
    - cron: '0 14 * * *'
  
  # 允许手动触发（用于测试）
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    
    steps:
      - name: 发送邮件提醒
        run: |
          echo "⏰ 开始发送邮件提醒..."
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            https://goals.wyhef.cloud/api/cron/send-reminders \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -eq 200 ]; then
            echo "✅ 邮件发送成功！"
          else
            echo "❌ 邮件发送失败！"
            exit 1
          fi
